<script src="https://browser.sentry-cdn.com/7.119.2/bundle.min.js" integrity="sha384-UAV3Sfi2QPbmw5+HHcldIoTSxJgxwUgDhjo8iXDzETyWCSKcmMpCajZvmth9RR9S" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="./js/sentry_init.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js" integrity="sha384-NNePyabYRaJyedI6EQAY7SV5Z8/0sQkuQ5WVfhKm0H+j0KSugkI2ZMNzw/QtzAWz" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="./js/app_bootstrap.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#05050f;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
canvas{display:block;width:100vw;height:100vh}

/* ===== SPLASH SCREEN ===== */
#orbita-splash{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 55%, #0c1a36 0%, #04060e 60%, #04060e 100%);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  transition:opacity .45s ease-out, visibility .45s;
  /* failsafe: se nada acontecer em 8s, esconde mesmo assim */
  animation:splash-failsafe 8s linear 1 forwards;
}
#orbita-splash.hidden{opacity:0;visibility:hidden;animation:none;pointer-events:none}

@keyframes splash-failsafe{
  0%,93%{opacity:1}
  100%{opacity:0}
}

/* Estrelas de fundo (apenas decoracao) */
#orbita-splash::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 12% 22%,rgba(255,255,255,.55) 50%,transparent 51%),
    radial-gradient(1px 1px at 78% 18%,rgba(255,255,255,.45) 50%,transparent 51%),
    radial-gradient(1.5px 1.5px at 28% 65%,rgba(160,200,255,.5) 50%,transparent 51%),
    radial-gradient(1px 1px at 65% 45%,rgba(255,255,255,.4) 50%,transparent 51%),
    radial-gradient(1.5px 1.5px at 88% 75%,rgba(255,210,160,.45) 50%,transparent 51%),
    radial-gradient(1px 1px at 18% 85%,rgba(255,255,255,.35) 50%,transparent 51%),
    radial-gradient(1px 1px at 50% 32%,rgba(255,255,255,.5) 50%,transparent 51%),
    radial-gradient(1px 1px at 92% 38%,rgba(255,255,255,.4) 50%,transparent 51%);
  animation:splash-twinkle 4s ease-in-out infinite alternate;
}
@keyframes splash-twinkle{
  from{opacity:.6}
  to{opacity:1}
}

/* Titulo com gradiente — logotype 2 linhas */
.splash-title{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:54px;
  position:relative;z-index:2;
  animation:splash-title-pulse 2.2s ease-in-out infinite alternate;
}
.splash-title .over{
  font-size:clamp(14px,4.5vw,22px);
  font-weight:600;letter-spacing:.45em;
  color:#80f5e8;opacity:.75;
  text-shadow:0 0 12px rgba(0,245,212,.6);
  margin-bottom:8px;padding-left:.45em; /* compensa letter-spacing pra centralizar */
}
.splash-title .main{
  font-size:clamp(48px,16vw,84px);
  font-weight:700;letter-spacing:.08em;
  background:linear-gradient(180deg,#ffffff 0%,#80f5e8 55%,#00f5d4 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  text-shadow:0 0 40px rgba(0,245,212,.35);
  filter:drop-shadow(0 0 28px rgba(0,245,212,.45));
  line-height:1;
}
@keyframes splash-title-pulse{
  from{transform:scale(1);filter:drop-shadow(0 0 24px rgba(0,245,212,.4))}
  to{transform:scale(1.025);filter:drop-shadow(0 0 36px rgba(0,245,212,.7))}
}

/* Linha decorativa abaixo do titulo */
.splash-title::after{
  content:'';position:absolute;left:50%;bottom:-14px;
  transform:translateX(-50%);
  width:60%;max-width:280px;height:1px;
  background:linear-gradient(90deg,transparent 0%,#00f5d4 50%,transparent 100%);
  opacity:.5;
}

/* Container do orbit demo */
.splash-orbit{
  position:relative;width:96px;height:96px;
  z-index:2;
}

/* Anel orbital tracejado */
.splash-orbit::before{
  content:'';position:absolute;inset:0;
  border:1px dashed rgba(255,255,255,.18);
  border-radius:50%;
}

/* No central */
.splash-node{
  position:absolute;left:50%;top:50%;
  width:14px;height:14px;margin:-7px 0 0 -7px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#80ffff,#00b89a 80%);
  box-shadow:0 0 18px #00f5d4;
}

/* Wrapper que rotaciona em torno do centro - bola fica como filha offset */
.splash-orbit-wrap{
  position:absolute;left:50%;top:50%;width:0;height:0;
  animation:splash-spin 1.6s linear infinite;
}
@keyframes splash-spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

/* Bola que orbita - posicionada com offset no eixo X */
.splash-ball{
  position:absolute;left:42px;top:0;
  width:11px;height:11px;margin:-5.5px 0 0 -5.5px;
  border-radius:50%;
  background:#ffffff;
  box-shadow:0 0 14px #ffffff,0 0 22px rgba(0,245,212,.6);
}

/* Trail da bola - pseudo elementos com offset rotativo (3 pontos seguindo) */
.splash-orbit-wrap::before,
.splash-orbit-wrap::after{
  content:'';position:absolute;border-radius:50%;
  background:#00f5d4;
  pointer-events:none;
}
.splash-orbit-wrap::before{
  left:42px;top:0;width:8px;height:8px;margin:-4px 0 0 -4px;
  opacity:.55;
  transform:rotate(-22deg) translateX(0);
  transform-origin:-42px 0;
}
.splash-orbit-wrap::after{
  left:42px;top:0;width:5px;height:5px;margin:-2.5px 0 0 -2.5px;
  opacity:.3;
  transform:rotate(-44deg) translateX(0);
  transform-origin:-42px 0;
}

/* Mensagem de carregando */
.splash-loading{
  position:relative;z-index:2;margin-top:46px;
  color:rgba(255,255,255,.55);
  font-size:13px;letter-spacing:.04em;
}
.splash-loading .dot{
  display:inline-block;
  animation:splash-dot 1.4s ease-in-out infinite;
}
.splash-loading .dot:nth-child(2){animation-delay:.16s}
.splash-loading .dot:nth-child(3){animation-delay:.32s}
@keyframes splash-dot{
  0%,40%,100%{opacity:.2}
  20%{opacity:1}
}
</style>
</head>
<body>
<div id="orbita-splash">
  <div class="splash-title"><span class="over">LAST</span><span class="main">ORBIT</span></div>
  <div class="splash-orbit">
    <div class="splash-node"></div>
    <div class="splash-orbit-wrap">
      <div class="splash-ball"></div>
    </div>
  </div>
  <div class="splash-loading">carregando<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
</div>
<canvas id="c"></canvas>
<script src="./js/core.js"></script>

<script src="./js/gameplay_ui.js"></script>
<script src="./js/i18n.js"></script>
<script src="./js/flappy_radical_patch.js"></script>
<script src="./js/main.js"></script>
</body>
</html>
